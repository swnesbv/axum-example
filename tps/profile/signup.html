{% extends "base.html" %}
{% block title %} register {% endblock title %}
{% block content %}

<h1 class="lead my-3">user register..</h1>

<p>
    {% if for_email %}
        <sup class="badge text-bg-danger">{{ for_email }}</sup>
    {% endif %}
    {% if for_username %}
        <sup class="badge text-bg-danger">{{ for_username }}</sup>
     {% endif %}
</p>

<div class="card">
<form class="mb-2" method="POST">
    <div class="card-body">
        <div class="mb-3">
            <sup>email..</sup>
            <input
                type="email"
                required
                placeholder="email"
                name="email"
                class="form-control"
            />
        </div>
        <div class="mb-3">
            <sup>name..</sup>
            <input
                type="text"
                required
                placeholder="name"
                name="username"
                class="form-control"
            />
        </div>
        <div class="mb-3">
            <sup>password..</sup>
            <input
                type="password"
                required
                placeholder="password"
                name="password"
                class="form-control"
            />
        </div>
    </div>
    <div class="card-footer">
    <button type="submit" class="btn btn-outline-primary btn-sm">
        submit
    </button>
    </div>
</form>
</div>
{% endblock content %}
