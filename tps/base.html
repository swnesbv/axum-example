<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>
    {% block title %} axum diesel {% endblock %}
</title>

<link rel="icon" type="image/x-icon" href="/assets/favicon.ico">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<link href="
https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css
" rel="stylesheet">

<link href="/assets/css/style.css" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&display=swap" rel="stylesheet">

{% block css %}{% endblock %}
</head>

<body class="bg-light">
{% include "navbar.html" %}

{% if msg %}
{% if msg[0] != "" %}
    <div class="container mb-3">
    <p class="alert alert-{{ msg[1] }}" role="alert">
        <sup>{{ msg[0] }}</sup>
    </p>
    </div>
{% endif %}
{% endif %}

{% if err %}
    <div class="container mb-3">
    <p class="alert alert-danger mb-3" role="alert">
        <sup class="badge text-bg-light">is err</sup>
            <sup>{{ err }}</sup>
    </p>
    </div>
{% endif %}

{% if is_no %}
<div class="container mb-3">
    <p class="alert alert-warning" role="alert">
        <sup class="badge text-bg-light">is no</sup>
            <sup>{{ is_no }}</sup>
    </p>
</div>
{% endif %}


<main role="main" class="base_main container">
    {% block content %}{% endblock %}
</main>

<footer class="container-fluid my-3">
    <sup class="mx-5">&copy; company</sup>
    <time id="time"></time>
</footer>

<script>
const month = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
const time = setInterval(() => {
    const date = new Date();
    document.getElementById('time').innerHTML = (`${month[date.getMonth()]}-${days[date.getDay()]}-${date.getDate()}--${date.getHours()}:${date.getMinutes()}:${date.getSeconds()}`);
}, 600);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>


{% block script %}{% endblock %}

</body>

</html>
