{% extends "base.html" %}
{% block title %} create hours period {% endblock title %}
{% block content %}

<h1 class="lead my-4">create hours period..</h1>

<div class="card">
<form class="mt-2" method="POST">
    <div class="card-body row">
	    <div class="col-sm">
	        <sup class="float-start">start..</sup>
	        <input
	            class="form-control my-2"
	            type="datetime-local"
	            name="start"
	        />
	    </div>
	    <div class="col-sm">
	        <sup class="float-start">end..</sup>
	        <input
	            class="form-control my-2"
	            type="datetime-local"
	            name="end"
	        />
	    </div>
	</div>

	<div class="card-footer">
	<input type="submit" value="submit" class="btn btn-sm btn-outline-primary mt-2">
	</div>
</form>
</div>
{% endblock content %}
