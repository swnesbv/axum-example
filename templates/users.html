{% extends "base.html" %}
{% block title %} users list {% endblock title %}

{% block content %}

{% if users %}
<ul class="list-group list-group-flush">
    {% for i in users %}
        <li class="list-group-item">
            <span>{{ i.id }}</span>
            <span class="mx-2">{{ i.username }}</span>
            <a href="/account/user/{{ i.username }}">{{ i.email }}</a>
        </li>
    {% endfor %}
</ul>
{% endif %}

{% endblock content %}
