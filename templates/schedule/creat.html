{% extends "base.html" %}
{% block title %} create schedule {% endblock title %}

{% block content %}

<h1 class="container lead my-3">create schedule</h1>
	
<form class="card" method="POST">
	<div class="card-body">
	<sup>title</sup>
	<input required type="text" name="title" class="form-control">
	<sup>description</sup>
	<input type="text" name="description" class="form-control">
	</div>

    <div class="card-body row">
	    <div class="col-sm">
	        <sup class="float-start">start</sup>
	        <input
	            class="form-control my-2"
	            type="datetime-local"
	            name="st_hour"
	        />
	    </div>
	    <div class="col-sm">
	        <sup class="float-start">end</sup>
	        <input
	            class="form-control my-2"
	            type="datetime-local"
	            name="en_hour"
	        />
	    </div>
	</div>

    <input
    	class="form-control my-2"
        type="text"
        name="vec_list"
        value="2024-09-01 08:00,2024-09-02 09:00,2024-09-03 10:00"
    />

	<div class="card-footer action-buttons">
	<input type="submit" value="submit" class="btn btn-sm btn-outline-primary mt-2">
	</div>

</form>



	  
{% endblock content %}
